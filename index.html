<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f3d5e">
  <title>Control de Asistencia BIG</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Control de Asistencia BIG</h1>
      <p>QR dinámico para varios maestros, 6 grupos y listas reales integradas</p>
    </div>
    <span id="modeBadge" class="badge">Modo local</span>
  </header>

  <main id="app"></main>

  <template id="loginTpl">
    <section class="card narrow">
      <h2>Ingreso</h2>
      <p class="muted">Selecciona tu perfil para comenzar.</p>
      <label>Perfil</label>
      <select id="role">
        <option value="admin">Administrador</option>
        <option value="teacher">Maestro</option>
      </select>
      <label>Nombre o usuario</label>
      <input id="username" placeholder="Ej. Eduardo Chávez">
      <button id="loginBtn">Entrar</button>
      <button id="studentBtn" class="secondary">Soy estudiante / registrar asistencia</button>
    </section>
  </template>

  <template id="studentTpl">
    <section class="card narrow">
      <h2>Registro de asistencia</h2>
      <div id="studentSessionInfo" class="info"></div>
      <label>Matrícula</label>
      <input id="studentMatricula" placeholder="Ej. BIG001">
      <label>Nombre completo</label>
      <input id="studentName" placeholder="Escribe tu nombre">
      <button id="submitAttendance">Registrar asistencia</button>
      <p id="studentMsg" class="msg"></p>
    </section>
  </template>
</body>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</html>
